[package]
name = "users_info"
version.workspace = true
publish = false
edition.workspace = true
license.workspace = true
authors.workspace = true

[lints]
workspace = true

[features]
default = ["odata"]
odata = []                  # enable streaming API with typed queries
integration = ["db-sqlite"] # gate integration tests

# Database driver selection - choose one at build time
db-sqlite = ["sea-orm/sqlx-sqlite", "sea-orm-migration/sqlx-sqlite", "modkit-db/sqlite"]
db-pg = ["sea-orm/sqlx-postgres", "sea-orm-migration/sqlx-postgres", "modkit-db/pg"]
db-mysql = ["sea-orm/sqlx-mysql", "sea-orm-migration/sqlx-mysql", "modkit-db/mysql"]

[dependencies]
# SDK - public API, models, and errors
user_info-sdk = { path = "../user_info-sdk", features = ["odata"] }

# Tenant resolver for multi-tenant access
tenant-resolver-sdk = { package = "cf-tenant-resolver-sdk", path = "../../../../modules/system/tenant_resolver/tenant_resolver-sdk" }

# Core dependencies
anyhow = { workspace = true }
async-trait = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
inventory = { workspace = true }

# Serde and JSON schema
serde = { workspace = true }
serde_json = { workspace = true }
utoipa = { workspace = true, features = ["time"] }

# HTTP and REST
axum = { workspace = true, features = ["macros"] }
tower-http = { workspace = true, features = ["timeout"] }
futures-util = { workspace = true }
http = { workspace = true }

# Time handling
time = { workspace = true }

# URL parsing
url = { workspace = true }

# UUID support
uuid = { workspace = true }

# Lock-free atomic swaps
arc-swap = { workspace = true }

# Database - SeaORM
sea-orm = { workspace = true, features = [
    "runtime-tokio-rustls",
    "macros",
    "with-time",
    "with-uuid",
] }
sea-orm-migration = { workspace = true, features = [] }

# Error handling
thiserror = { workspace = true }

# Local dependencies
modkit = { workspace = true }
# NOTE: insecure-escape enabled for migrations and example infrastructure code
modkit-db = { workspace = true, features = ["insecure-escape"] }
modkit-db-macros = { workspace = true }
modkit-auth = { workspace = true }
modkit-security = { workspace = true }
modkit-errors = { workspace = true }
modkit-errors-macro = { workspace = true }
modkit-odata = { workspace = true, features = ["with-utoipa"] }
modkit-sdk = { workspace = true }
modkit-macros = { workspace = true }

[dev-dependencies]
tokio-util = { workspace = true }
tower = { workspace = true, features = ["util"] }
api_gateway = { package = "cf-api-gateway", path = "../../../../modules/system/api_gateway" }
serde_json = { workspace = true }
testcontainers = { workspace = true }
testcontainers-modules = { workspace = true, features = ["postgres"] }
# Testing dependencies for tracing verification
tracing-test = { workspace = true }
httpmock = { workspace = true }
tokio-test = { workspace = true }
opentelemetry = { workspace = true }
opentelemetry_sdk = { workspace = true }
