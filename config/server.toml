# HyperSpot Server Configuration
# Updated to use the new configuration structure

# Core server configuration (global section)
[server]
home_dir = "~/.hyperspot"

# Database configuration (simplified structure)
# SQLite server for sysinfo module
[database.servers.sqlite_sysinfo]
dsn = "sqlite://sysinfo.db?wal=true&synchronous=NORMAL&busy_timeout=5000"
[database.servers.sqlite_sysinfo.pool]
max_conns = 5
acquire_timeout = "30s"

# SQLite server for benchmarks module
[database.servers.sqlite_benchmarks]
dsn = "sqlite://benchmarks.db?wal=true&synchronous=NORMAL&busy_timeout=5000"
[database.servers.sqlite_benchmarks.pool]
max_conns = 8
acquire_timeout = "30s"

# SQLite server for chat module
[database.servers.sqlite_chat]
dsn = "sqlite://chat.db?wal=true&synchronous=NORMAL&busy_timeout=5000"
[database.servers.sqlite_chat.pool]
max_conns = 10
acquire_timeout = "30s"

# Example PostgreSQL server (uncomment to use)
# [database.servers.postgres_main]
# dsn = "postgresql://hyperspot:${PG_PASSWORD}@localhost:5432/hyperspot"
# [database.servers.postgres_main.pool]
# max_conns = 10
# acquire_timeout = "30s"

# Logging configuration
# global section
[logging.default]
console_level = "info"
file = "logs/hyperspot.log"
file_level = "warn"
max_age_days = 28
max_backups = 3
max_size_mb = 1000

# api_ingress section
[logging.api_ingress]
console_level = "info"
file = "logs/api.log"
file_level = "warn"
max_age_days = 28
max_backups = 3
max_size_mb = 10000

# Per-module configurations moved under modules section

# No database needed for api_ingress
[modules.api_ingress.config]
bind_addr = "127.0.0.1:8087"
enable_docs = true
cors_enabled = true

# Sysinfo module with SQLite database
[modules.sysinfo.database]
server = "sqlite_sysinfo"

[modules.sysinfo.config]
persist = true
pruning_days = 30
collection_interval_sec = 300

# Benchmarks module with database for storing results
[modules.benchmarks.database]
server = "sqlite_benchmarks"

[modules.benchmarks.config.llm]
# LLM configuration goes here

[modules.benchmarks.config.coding.humaneval]
code_executor = "docker_python_default"
description = "HumanEval is a dataset of 158 programming problems, each with an expected solution. The problems are designed to be challenging and to test the breadth of programming knowledge."
max_retries = 3
pause_between_samples_sec = 0
retry_delay_sec = 5
system_prompt = "solve the following problem, generate only the code, do not include any other text"

[modules.benchmarks.config.coding.humaneval.dataset]
local_path = "datasets/humaneval.parquet"
original_url = "https://huggingface.co/datasets/openai/openai_humaneval/resolve/main/openai_humaneval/test-00000-of-00001.parquet?download=true"

[modules.benchmarks.config.coding.humaneval.presets.custom]
customizable = true
description = ""
max_tokens = 2048
problems = 1
samples = 1
temperature = 0.2
timeout_sec = 0

[modules.benchmarks.config.coding.humaneval.presets.full]
customizable = false
description = ""
max_tokens = 2048
problems = 0
samples = 3
temperature = 0.2
timeout_sec = 172800

[modules.benchmarks.config.coding.humaneval.presets.medium]
customizable = false
description = ""
max_tokens = 2048
problems = 50
samples = 3
temperature = 0.2
timeout_sec = 43200

[modules.benchmarks.config.coding.humaneval.presets.mini]
customizable = false
description = ""
max_tokens = 2048
problems = 10
samples = 3
temperature = 0.2
timeout_sec = 0

[modules.benchmarks.config.coding.mbpp]
