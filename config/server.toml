timeout_sec = 172800

[modules.benchmarks.config.coding.mbpp.presets."medium-1shot"]
customizable = false
description = ""
max_tokens = 2048
problems = 50
shots = 1
temperature = 0.2
timeout_sec = 43200

[modules.benchmarks.config.coding.mbpp.presets."medium-3shots"]
